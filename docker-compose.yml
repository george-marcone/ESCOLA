name: escola-high-tech

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD no arquivo .env}
      MSSQL_PID: Express
    ports:
      - "${MSSQL_HOST_PORT:-1433}:1433"
    volumes:
      - escola-mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -b -o /dev/null) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=${MSSQL_DATABASE:-ESCOLA_API};User Id=sa;Password=${MSSQL_SA_PASSWORD:?Defina MSSQL_SA_PASSWORD no arquivo .env};TrustServerCertificate=True;Encrypt=False
      Jwt__Key: ${JWT_KEY:?Defina JWT_KEY no arquivo .env}
      Jwt__Issuer: ${JWT_ISSUER:-escola-api}
      Jwt__Audience: ${JWT_AUDIENCE:-escola-client}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-120}
      ServiceBus__ConnectionString: ${SERVICEBUS_CONNECTION_STRING:-}
      ServiceBus__QueueName: ${SERVICEBUS_QUEUE_NAME:-notificacoes}
    ports:
      - "${API_HOST_PORT:-5001}:80"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  escola-mssql-data:
    name: escola-high-tech-mssql-data
