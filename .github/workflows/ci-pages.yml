name: ESCOLA_API - CI/CD GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: escola-api-pages
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Build, test and package docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ESCOLA_API.Tests/ESCOLA_API.Tests.csproj

      - name: Build backend
        run: dotnet build ESCOLA_API.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ESCOLA_API.Tests/ESCOLA_API.Tests.csproj --configuration Release --no-restore

      - name: Prepare GitHub Pages artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p _site
          cp docs/documentacao-tecnica-backend.html _site/index.html
          cp docs/documentacao-tecnica-backend.pdf _site/

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
